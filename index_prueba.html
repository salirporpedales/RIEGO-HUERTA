

  
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Riego Pro - Huerta</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --primary: #1b5e20; 
            --waiting: #fbc02d; 
            --active: #43a047; 
            --off: #90a4ae; 
            --stop: #d32f2f; 
            --bg: #7BA637; 
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        #loginForm, #dashboard { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 850px; 
            box-sizing: border-box; 
        }

        #loginForm { max-width: 380px; margin-top: 60px; text-align: center; }
        input[type="email"], input[type="password"] { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;
        }

        /* MONITOR DE ESTADO Y SENSORES */
        .status-bar {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 4px solid var(--off);
            transition: 0.3s;
        }
        .status-online { border-bottom-color: var(--active); color: var(--primary); }
        .status-error { border-bottom-color: var(--stop); color: var(--stop); background: #fdeded; animation: shake 0.5s infinite; }

        .sensor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .sensor-tile {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.85em;
            font-weight: bold;
            border: 1px solid #eee;
        }
        .pump-active { background: #e8f5e9; color: var(--active); border: 2px solid var(--active); animation: pulse 2s infinite; }

        #error-banner { 
            display: none; background: var(--stop); color: white; padding: 15px; border-radius: 12px; 
            margin-bottom: 15px; text-align: center; font-weight: bold;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        .relay-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #ffffff; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .btn-relay { 
            width: 100%; padding: 18px 5px; border: none; border-radius: 12px; color: white; 
            font-weight: bold; cursor: pointer; background: var(--off); transition: 0.3s;
        }
        .status-waiting { background: var(--waiting) !important; color: #333; }
        .status-active { background: var(--active) !important; box-shadow: 0 4px 12px rgba(76,175,80,0.4); }
        
        .timer-display { display: block; font-size: 0.8em; margin-top: 8px; color: #555; background: rgba(0,0,0,0.05); border-radius: 4px; }

        .footer-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-emergency { flex: 2; background: var(--stop); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-reset { flex: 1; background: #0288d1; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }
    </style>
</head>
<body>

    <div id="loginForm">
        <h2 style="margin-bottom: 5px;">🌿 Riego Huerta</h2>
        <p style="color: #666; font-size: 0.9em; margin-bottom: 20px;">Acceso restringido</p>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">ENTRAR AL PANEL</button>
    </div>

    <div id="dashboard" style="display:none">
        
        <div id="status-display" class="status-bar">
            ESTADO: <span id="status-text">CARGANDO...</span>
        </div>

        <div id="error-banner">
            🚨 BOMBA BLOQUEADA: FALLO DE FLUJO 🚨<br>
            <small>Verifica el agua y presiona REARMAR para continuar.</small>
        </div>

        <div class="sensor-grid">
            <div id="pump-status" class="sensor-tile">BOMBA: OFF</div>
            <div id="pipe-status" class="sensor-tile">TUBERÍA (XKC): --</div>
        </div>

        <div class="header">
            <div>
                <strong>⏱️ Tiempo:</strong>
                <input type="number" id="tiempo" style="width:50px; padding:5px; border-radius:5px;" min="1" value="10"> min
            </div>
            <button onclick="logout()" style="background:#607d8b; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">Cerrar</button>
        </div>

        <div class="relay-grid" id="grid">
            </div>

        <div class="footer-btns">
            <button class="btn-emergency" onclick="emergencyStop()">🛑 PARADA TOTAL</button>
            <button class="btn-reset" onclick="resetSystem()">🔄 REARMAR</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD2QRDQ-QoxZ8GwgEonC0gQJ6CU6BG-Th4",
            authDomain: "riego-huerta.firebaseapp.com",
            databaseURL: "https://riego-huerta-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "riego-huerta",
            appId: "1:153931971594:web:4c385921df852541c7f3f3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Autenticación
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Acceso denegado: " + e.message));
        }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            document.getElementById('loginForm').style.display = user ? 'none' : 'block';
            document.getElementById('dashboard').style.display = user ? 'block' : 'none';
            if(user) initApp();
        });

        // Configuración de Sectores (Solo 7, el 8 es la bomba)
        const sectores = ["Sector 1", "Sector 2", "Sector 3", "Sector 4", "Sector 5", "Sector 6", "Depósito Aux"];
        let activeTimers = {};

        function initApp() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            
            // 1. Escuchar Estado General
            db.ref('status').on('value', snap => {
                const status = snap.val() || "DESCONOCIDO";
                const text = document.getElementById('status-text');
                const bar = document.getElementById('status-display');
                text.innerText = status;
                bar.className = (status === "ERROR DE FLUJO") ? "status-bar status-error" : "status-bar status-online";
            });

            // 2. Escuchar Estado Bomba (Relé 8)
            db.ref('relay8').on('value', snap => {
                const isOn = snap.val();
                const tile = document.getElementById('pump-status');
                tile.innerText = isOn ? "BOMBA: FUNCIONANDO" : "BOMBA: APAGADA";
                tile.className = isOn ? "sensor-tile pump-active" : "sensor-tile";
            });

            // 3. Escuchar Sensor de Tubería (XKC)
            db.ref('hay_agua').on('value', snap => {
                const hayAgua = snap.val();
                const tile = document.getElementById('pipe-status');
                tile.innerText = hayAgua ? "AGUA: DETECTADA" : "AGUA: NO DETECTADA";
                tile.style.color = hayAgua ? "#2e7d32" : "#c62828";
            });

            // 4. Configuración de tiempo
            db.ref('tiempo').on('value', s => document.getElementById('tiempo').value = s.val() || 10);
            document.getElementById('tiempo').onchange = (e) => db.ref('tiempo').set(parseInt(e.target.value));

            // 5. Banner de Error
            db.ref('error_flujo').on('value', snap => {
                document.getElementById('error-banner').style.display = snap.val() ? 'block' : 'none';
            });

            // 6. Cargar Botones de Sectores
            sectores.forEach((nombre, i) => {
                const id = i + 1;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3 style="margin:0 0 10px 0; font-size: 0.9em; color:#444">${nombre}</h3>
                    <button class="btn-relay" id="btn${id}" onclick="controlRelay(${id})">
                        <span id="txt${id}">ACTIVAR</span>
                        <span id="timer${id}" class="timer-display" style="display:none">00:00</span>
                    </button>`;
                grid.appendChild(card);

                db.ref(`relay${id}`).on('value', () => actualizarUI(id));
                db.ref(`orden${id}`).on('value', () => actualizarUI(id));
            });
        }

        function actualizarUI(id) {
            const btn = document.getElementById(`btn${id}`);
            const txt = document.getElementById(`txt${id}`);
            const timerSpan = document.getElementById(`timer${id}`);
            
            db.ref(`relay${id}`).once('value', rSnap => {
                db.ref(`orden${id}`).once('value', oSnap => {
                    const relay = rSnap.val();
                    const orden = oSnap.val();

                    if (relay && orden) {
                        btn.className = "btn-relay status-active";
                        txt.innerText = "REGANDO";
                        timerSpan.style.display = "block";
                        startTimer(id);
                    } else if (relay && !orden) {
                        btn.className = "btn-relay status-waiting";
                        txt.innerText = "ABRIENDO...";
                        timerSpan.style.display = "none";
                    } else {
                        btn.className = "btn-relay";
                        txt.innerText = "ACTIVAR";
                        timerSpan.style.display = "none";
                        stopTimer(id);
                    }
                });
            });
        }

        function controlRelay(id) {
            db.ref('error_flujo').once('value', e => {
                if(e.val()) { alert("⚠️ El sistema está bloqueado por seguridad."); return; }
                const ref = db.ref(`relay${id}`);
                ref.once('value', snap => ref.set(!snap.val()));
            });
        }

        function startTimer(id) {
            if (activeTimers[id]) return;
            let totalSecs = document.getElementById('tiempo').value * 60;
            activeTimers[id] = setInterval(() => {
                totalSecs--;
                const span = document.getElementById(`timer${id}`);
                if (totalSecs <= 0 || !span) {
                    stopTimer(id);
                } else {
                    let m = Math.floor(totalSecs / 60);
                    let s = totalSecs % 60;
                    span.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);
        }

        function stopTimer(id) {
            clearInterval(activeTimers[id]);
            delete activeTimers[id];
        }

        function resetSystem() {
            if(confirm("¿Desea rearmar la bomba y limpiar errores?")) {
                db.ref('reset_error').set(true);
                setTimeout(() => db.ref('reset_error').set(false), 2000);
            }
        }

        function emergencyStop() {
            if(confirm("🚨 ¿APAGAR TODO EL SISTEMA?")) {
                for(let i=1; i<=7; i++) db.ref(`relay${i}`).set(false);
                db.ref('stop').set(true);
                setTimeout(() => db.ref('stop').set(false), 1500);
            }
        }
    </script>
</body>
</html>
