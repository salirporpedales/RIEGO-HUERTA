<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Riego Pro - Control Total</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #2e7d32; --waiting: #ff9800; --active: #4caf50; --off: #78909c; --stop: #c62828; --bg: #7BA637; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; margin: 0; }
        
        #loginForm, #dashboard { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 850px; box-sizing: border-box; }
        #loginForm { max-width: 350px; margin-top: 60px; }
        
        h2, h3 { margin-top: 0; color: #333; }
        input[type="email"], input[type="password"], input[type="number"] { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; 
        }

        /* Alerta Roja de Error */
        #error-banner { 
            display: none; background: #fdeded; color: #d32f2f; padding: 15px; border-radius: 12px; 
            border: 2px solid #d32f2f; margin-bottom: 20px; text-align: center; font-weight: bold;
            animation: shake 0.5s;
        }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        
        /* Rejilla de Sectores */
        .relay-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .card { background: #f8f9fa; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .card h3 { font-size: 1.1em; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; }

        /* Botones de Sector */
        .btn-relay { width: 100%; padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; background: var(--off); transition: 0.4s; font-size: 1em; }
        .status-waiting { background: var(--waiting) !important; animation: blink 1s infinite; }
        .status-active { background: var(--active) !important; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3); }
        .timer-display { display: block; font-size: 0.85em; margin-top: 8px; font-weight: normal; background: rgba(0,0,0,0.1); border-radius: 5px; }
        @keyframes blink { 50% { opacity: 0.7; } }

        /* Botones Inferiores */
        .footer-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-emergency { flex: 2; background: var(--stop); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1em; }
        .btn-reset { flex: 1; background: #0288d1; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-logout { background: #546e7a; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginForm">
        <h2 style="text-align:center; color: var(--primary)">Riego Inteligente</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">ENTRAR AL PANEL</button>
    </div>

    <!-- PANEL DE CONTROL -->
    <div id="dashboard" style="display:none">
        <div id="error-banner">
            🚨 FALLO DE FLUJO: BOMBA BLOQUEADA 🚨<br>
            <small>Verifique el suministro de agua y pulse RESET.</small>
        </div>

        <div class="header">
            <div>
                <strong>⏱️ Duración:</strong>
                <input type="number" id="tiempo" style="width:55px; text-align:center;" min="1" value="10"> min
            </div>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div class="relay-grid" id="grid"></div>

        <div class="footer-btns">
            <button class="btn-emergency" onclick="emergencyStop()">🛑 PARADA DE EMERGENCIA</button>
            <button class="btn-reset" onclick="resetSystem()">🔄 RESET</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyD2QRDQ-QoxZ8GwgEonC0gQJ6CU6BG-Th4",
            authDomain: "riego-huerta.firebaseapp.com",
            databaseURL: "https://riego-huerta-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "riego-huerta",
            appId: "1:153931971594:web:4c385921df852541c7f3f3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- 2. LÓGICA DE USUARIO ---
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Error de acceso: " + e.message));
        }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            document.getElementById('loginForm').style.display = user ? 'none' : 'block';
            document.getElementById('dashboard').style.display = user ? 'block' : 'none';
            if(user) initApp();
        });

        // --- 3. INICIALIZACIÓN DEL PANEL ---
        const sectores = ["Sector 1", "Sector 2", "Sector 3", "Sector 4", "Sector 5", "Sector 6", "Sector 7", "Sector 8"];
        let activeTimers = {};

        function initApp() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            
            // Sincronizar Tiempo Global
            db.ref('tiempo').on('value', s => document.getElementById('tiempo').value = s.val() || 10);
            document.getElementById('tiempo').onchange = (e) => db.ref('tiempo').set(parseInt(e.target.value));

            // Escuchar Alerta de Error
            db.ref('error_flujo').on('value', snap => {
                document.getElementById('error-banner').style.display = snap.val() ? 'block' : 'none';
            });

            // Crear Botones
            sectores.forEach((nombre, i) => {
                const id = i + 1;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${nombre}</h3>
                    <button class="btn-relay" id="btn${id}" onclick="controlRelay(${id})">
                        <span id="txt${id}">ACTIVAR</span>
                        <span id="timer${id}" class="timer-display" style="display:none"></span>
                    </button>`;
                grid.appendChild(card);

                // Escuchar cambios de estado
                db.ref(`relay${id}`).on('value', () => actualizarUI(id));
                db.ref(`orden${id}`).on('value', () => actualizarUI(id));
            });
        }

        function actualizarUI(id) {
            const btn = document.getElementById(`btn${id}`);
            const txt = document.getElementById(`txt${id}`);
            const timerSpan = document.getElementById(`timer${id}`);
            
            db.ref(`relay${id}`).once('value', rSnap => {
                db.ref(`orden${id}`).once('value', oSnap => {
                    const r = rSnap.val(); // Intención
                    const o = oSnap.val(); // Realidad del NodeMCU

                    if (r && o) { // VERDE
                        btn.className = "btn-relay status-active";
                        txt.innerText = "REGANDO";
                        timerSpan.style.display = "block";
                        startTimer(id);
                    } else if (r && !o) { // NARANJA
                        btn.className = "btn-relay status-waiting";
                        txt.innerText = "CONECTANDO...";
                        timerSpan.style.display = "none";
                    } else { // GRIS
                        btn.className = "btn-relay";
                        txt.innerText = "ACTIVAR";
                        timerSpan.style.display = "none";
                        stopTimer(id);
                    }
                });
            });
        }

        // --- 4. FUNCIONES DE CONTROL ---
        function controlRelay(id) {
            db.ref('error_flujo').once('value', e => {
                if(e.val()) { alert("⚠️ Sistema bloqueado por falta de flujo."); return; }
                const ref = db.ref(`relay${id}`);
                ref.once('value', snap => ref.set(!snap.val()));
            });
        }

        function startTimer(id) {
            if (activeTimers[id]) return;
            let totalSecs = document.getElementById('tiempo').value * 60;
            activeTimers[id] = setInterval(() => {
                totalSecs--;
                const span = document.getElementById(`timer${id}`);
                if (totalSecs <= 0) {
                    stopTimer(id);
                    if(span) span.innerText = "CERRANDO...";
                } else {
                    let m = Math.floor(totalSecs / 60);
                    let s = totalSecs % 60;
                    if(span) span.innerText = `${m}m ${s < 10 ? '0' : ''}${s}s`;
                }
            }, 1000);
        }

        function stopTimer(id) {
            clearInterval(activeTimers[id]);
            delete activeTimers[id];
        }

        function resetSystem() {
            if(confirm("¿Desea rearmar el sistema y limpiar el error?")) {
                db.ref('reset_error').set(true);
                setTimeout(() => db.ref('reset_error').set(false), 1500);
            }
        }

        function emergencyStop() {
            if(confirm("🚨 ¿APAGAR TODO INMEDIATAMENTE?")) {
                for(let i=1; i<=8; i++) db.ref(`relay${i}`).set(false);
                db.ref('stop').set(true);
                setTimeout(() => db.ref('stop').set(false), 1000);
            }
        }
    </script>
</body>
</html>
